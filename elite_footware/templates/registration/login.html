{% extends "layout/layout.html" %}
{% block title %}
  Login
{% endblock title %}
{% block content %}
  <h2>Login Form</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-success" type="submit">Login</button>
  </form>
  <p>Don't Have an Account? <a href="{% url 'register' %}">Register</a></p>
{% endblock content %}
