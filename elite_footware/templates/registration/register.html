{% extends "layout/layout.html" %}

{% block title %}
  Register
{% endblock title %}

{% block content %}
  <h2>Register User</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-success" type="submit">Register</button>
  </form>
  <p>Already Have an Account? <a href="{% url 'login' %}">Login</a></p>
{% endblock content %}
